{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span>🍽️</span></div>
    <h2 class="auth-title">Create Account</h2>
    <p class="auth-sub">Join SmartCanteen today — it's free!</p>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="name">Full Name *</label>
          <input id="name" type="text" name="name" class="form-control" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="phone">Phone</label>
          <input id="phone" type="tel" name="phone" class="form-control" placeholder="9876543210">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email Address *</label>
        <input id="email" type="email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="department">Department / Class</label>
        <input id="department" type="text" name="department" class="form-control" placeholder="e.g. Computer Science, B.Tech 2nd Year">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="password">Password *</label>
          <input id="password" type="password" name="password" class="form-control" placeholder="Min 6 chars" required autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm Password *</label>
          <input id="confirm_password" type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="auth-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></div>
  </div>
</div>
{% endblock %}
