{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span>🍽️</span></div>
    <h2 class="auth-title">Welcome back!</h2>
    <p class="auth-sub">Sign in to your SmartCanteen account</p>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <div class="search-bar">
          <i class="fas fa-envelope"></i>
          <input id="email" type="email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="search-bar">
          <i class="fas fa-lock"></i>
          <input id="password" type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a>
    </div>

    <div style="margin-top:20px;padding:12px;background:var(--bg-secondary);border-radius:8px;font-size:12px;color:var(--text-muted);">
      <strong style="color:var(--text-secondary);">Demo Admin:</strong> admin@canteen.com / admin123
    </div>
  </div>
</div>
{% endblock %}
