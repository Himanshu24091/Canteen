{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span>🍽️</span></div>
    <h2 class="auth-title">Forgot Password</h2>
    <p class="auth-sub">Enter your email to reset your password.</p>

    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
      <div class="form-group">
        <label class="form-label" for="email">Email Address *</label>
        <input id="email" type="email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="password">New Password *</label>
          <input id="password" type="password" name="password" class="form-control" placeholder="Min 6 chars" required autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm Password *</label>
          <input id="confirm_password" type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
        <i class="fas fa-key"></i> Reset Password
      </button>
    </form>

    <div class="auth-footer">Remember your password? <a href="{{ url_for('auth.login') }}">Sign in</a></div>
  </div>
</div>
{% endblock %}
